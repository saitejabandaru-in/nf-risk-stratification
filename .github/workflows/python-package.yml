name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from importlib.resources import files
          from nf_risk_stratification import read_nf_data, run_nf_pipeline
          fixture = files("nf_risk_stratification").joinpath("data/nf_clinical_data_example.csv")
          data = read_nf_data(fixture)
          result = run_nf_pipeline(data, bootstrap_reps=100)
          assert result["ranking"]
          PY
